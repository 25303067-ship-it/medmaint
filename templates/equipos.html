<!DOCTYPE html>
<html>
<head>

<title>Equipos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Equipos</h2>

<form method="POST">

<input name="nombre" placeholder="Nombre equipo" class="form-control mb-2">

<input name="area" placeholder="Área" class="form-control mb-2">

<input name="estado" placeholder="Estado" class="form-control mb-2">

<button class="btn btn-success">Agregar</button>

</form>

<hr>

<table class="table">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Área</th>
<th>Estado</th>
</tr>

{% for e in equipos %}

<tr>
<td>{{e.id}}</td>
<td>{{e.nombre}}</td>
<td>{{e.area}}</td>
<td>{{e.estado}}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
